<!DOCTYPE html>
<html>
<head>
    <title>CC0007 Dysgraphia Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; text-align: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { border: 2px solid #333; background: #f9f9f9; touch-action: none; }
        .controls { padding: 10px; background: #eee; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="controls">
        <h3>CC0007: Smart Pen Demo</h3>
        <p>Try to trace the circle with your <b>non-dominant hand</b>.</p>
        <button onclick="clearCanvas()">Clear</button>
    </div>
    <canvas id="paintCanvas"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 100;

        let drawing = false;
        
        // Settings for the "Simulation"
        const jitterIntensity = 15; // How much the pen "shakes"
        const lagAmount = 5;       // How many frames the ink trails behind

        function drawTarget() {
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 100, 0, Math.PI * 2);
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 20;
            ctx.stroke();
        }

        function getDistance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1)**2 + (y2 - y1)**2);
        }

        function startDrawing(e) { drawing = true; draw(e); }
        function stopDrawing() { drawing = false; ctx.beginPath(); }

        function draw(e) {
            if (!drawing) return;
            const t = e.touches ? e.touches[0] : e;
            
            // 1. ADD JITTER (The Dysgraphia Simulation)
            const x = t.clientX + (Math.random() - 0.5) * jitterIntensity;
            const y = (t.clientY - 100) + (Math.random() - 0.5) * jitterIntensity;

            // 2. CHECK DISTANCE (The AI Correction Logic)
            const centerX = canvas.width/2;
            const centerY = canvas.height/2;
            const distFromCenter = getDistance(x, y, centerX, centerY);
            
            // If user is more than 15px away from the 100px radius circle
            if (Math.abs(distFromCenter - 100) > 15) {
                if (navigator.vibrate) navigator.vibrate(50); // Vibrate phone
                ctx.strokeStyle = "red";
            } else {
                ctx.strokeStyle = "green";
            }

            ctx.lineWidth = 5;
            ctx.lineCap = "round";
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTarget();
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        drawTarget();
    </script>
</body>
</html>
